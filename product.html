<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">مبادر كوتشينج</title>
  <meta name="description" id="page-desc" content="" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0D1F3C;
      --navy-light: #162B52;
      --navy-mid: #1E3A6E;
      --gold: #C9A84C;
      --gold-light: #E8C96A;
      --gold-pale: #F5E9C8;
      --white: #FFFFFF;
      --gray-50: #F8F9FA;
      --gray-100: #F0F1F3;
      --gray-300: #C8CDD6;
      --gray-500: #6B7280;
      --gray-700: #374151;
      --text-main: #0D1F3C;
      --text-light: #6B7280;
      --font: 'Cairo', 'Arial', sans-serif;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(13,31,60,0.10);
      --shadow-lg: 0 8px 40px rgba(13,31,60,0.16);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font); color: var(--text-main); background: var(--white);
      direction: rtl; text-align: right; line-height: 1.7; overflow-x: hidden;
    }

    .nav {
      position: fixed; top: 0; right: 0; left: 0; z-index: 999;
      background: rgba(13,31,60,0.97); backdrop-filter: blur(10px);
      padding: 0 5%; height: 70px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(201,168,76,0.2);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-img-wrap { background: var(--white); border-radius: 10px; padding: 6px 14px; display: flex; align-items: center; }
    .nav-logo-img { height: 50px; width: auto; display: block; }
    .nav-back { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .nav-back:hover { color: var(--gold); }
    .nav-cta {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--navy); padding: 9px 22px; border-radius: 8px;
      text-decoration: none; font-weight: 700; font-size: 14px;
      border: none; cursor: pointer; font-family: var(--font);
    }

    .hero {
      min-height: 60vh; background: var(--navy); position: relative; overflow: hidden;
      display: flex; align-items: center; padding: 100px 5% 50px;
    }
    .hero-bg-pattern {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(201,168,76,0.07) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(30,58,110,0.6) 0%, transparent 50%);
    }
    .hero-inner { position: relative; z-index: 2; max-width: 1000px; margin: 0 auto; width: 100%; text-align: center; }
    .hero-type-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.3);
      border-radius: 100px; padding: 7px 18px; color: var(--gold); font-size: 13px; font-weight: 700;
      margin-bottom: 20px;
    }
    .hero-title { font-size: clamp(24px, 4vw, 42px); font-weight: 800; color: var(--white); line-height: 1.4; margin-bottom: 14px; }
    .hero-tagline { color: var(--gold-light); font-size: 16px; font-weight: 600; margin-bottom: 20px; }
    .hero-desc { color: rgba(255,255,255,0.75); font-size: 15px; line-height: 1.9; max-width: 640px; margin: 0 auto 30px; }
    .hero-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--navy); padding: 15px 34px; border-radius: 10px;
      font-weight: 700; font-size: 15px; text-decoration: none;
      display: inline-flex; align-items: center; gap: 8px;
      border: none; cursor: pointer; font-family: var(--font);
      box-shadow: 0 4px 20px rgba(201,168,76,0.3);
    }
    .btn-whatsapp {
      background: #25D366; color: var(--white); padding: 15px 28px; border-radius: 10px;
      font-weight: 700; font-size: 15px; display: inline-flex; align-items: center; gap: 8px;
      border: none; cursor: pointer; font-family: var(--font);
    }

    .section { padding: 70px 5%; }
    .section-inner { max-width: 900px; margin: 0 auto; }
    .section-title { font-size: clamp(20px, 2.8vw, 28px); font-weight: 800; color: var(--navy); margin-bottom: 28px; text-align: center; }

    /* DETAILS GRID — meta facts about the product (duration, format, pages count, etc.) */
    .details-section { background: var(--gray-50); }
    .details-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 36px; }
    .detail-card { background: var(--white); border-radius: 14px; padding: 18px; text-align: center; border: 1px solid var(--gray-100); }
    .detail-card .ic { color: var(--gold); font-size: 20px; margin-bottom: 8px; }
    .detail-card .lbl { color: var(--navy); font-size: 14px; font-weight: 700; }
    .detail-card .sub { color: var(--text-light); font-size: 11.5px; margin-top: 3px; }

    /* OUTPUTS / TOC */
    .outputs-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; }
    .output-item { display: flex; align-items: flex-start; gap: 10px; background: var(--white); padding: 14px 16px; border-radius: 12px; border: 1px solid var(--gray-100); font-size: 14px; color: var(--gray-700); }
    .output-item .chk { color: var(--gold); font-weight: 800; flex-shrink: 0; }

    /* EXTRAS */
    .extras-section { background: var(--white); }
    .extras-list { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .extra-pill { background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.25); border-radius: 100px; padding: 8px 18px; font-size: 13px; font-weight: 600; color: var(--navy); }

    /* PRICE / CTA CARD */
    .buy-section { background: var(--navy); }
    .buy-card {
      max-width: 560px; margin: 0 auto; background: rgba(255,255,255,0.05);
      border: 1px solid var(--gold); border-radius: 22px; padding: 40px; text-align: center;
    }
    .buy-price { color: var(--gold); font-size: 40px; font-weight: 800; line-height: 1; margin-bottom: 6px; }
    .buy-price-unit { color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 26px; }
    .buy-actions { display: flex; flex-direction: column; gap: 12px; }
    .btn-buy-main {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--navy); padding: 16px; border-radius: 12px; font-weight: 800; font-size: 16px;
      border: none; cursor: pointer; font-family: var(--font);
    }
    .btn-buy-wa {
      background: #25D366; color: white; padding: 14px; border-radius: 12px;
      font-weight: 700; font-size: 14px; border: none; cursor: pointer; font-family: var(--font);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    /* ABOUT COACH (shared block) */
    .about-section { background: var(--gray-50); }
    .about-card { display: flex; gap: 24px; align-items: center; background: var(--white); border-radius: 18px; padding: 30px; border: 1px solid var(--gray-100); flex-wrap: wrap; justify-content: center; }
    .about-photo { width: 100px; height: 100px; border-radius: 50%; overflow: hidden; border: 3px solid var(--gold); flex-shrink: 0; }
    .about-photo img { width: 100%; height: 100%; object-fit: cover; }
    .about-text { flex: 1; min-width: 240px; }
    .about-text h3 { color: var(--navy); font-size: 17px; font-weight: 800; margin-bottom: 8px; }
    .about-text p { color: var(--text-light); font-size: 13.5px; line-height: 1.8; }

    footer { background: var(--navy); color: rgba(255,255,255,0.55); padding: 40px 5%; text-align: center; border-top: 1px solid rgba(255,255,255,0.07); }
    footer .footer-copy { font-size: 12px; color: rgba(255,255,255,0.3); }
    footer a { color: var(--gold); text-decoration: none; font-size: 13px; }

    /* MODAL (order form) */
    .overlay { position: fixed; inset: 0; z-index: 1200; background: rgba(0,0,0,0.55); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; padding: 20px; }
    .overlay.open { display: flex; }
    .modal { background: var(--white); border-radius: 20px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 22px 26px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--white); }
    .modal-title { font-size: 17px; font-weight: 700; color: var(--navy); }
    .modal-close { width: 32px; height: 32px; border-radius: 50%; background: var(--gray-100); border: none; cursor: pointer; font-size: 16px; }
    .modal-body { padding: 22px 26px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; color: var(--navy); font-weight: 600; font-size: 13px; margin-bottom: 5px; }
    .form-input { width: 100%; padding: 11px 14px; border: 2px solid var(--gray-100); border-radius: 10px; font-family: var(--font); font-size: 14px; color: var(--navy); outline: none; }
    .form-input:focus { border-color: var(--gold); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--navy); border: none; border-radius: 12px; font-family: var(--font); font-weight: 700; font-size: 15px; cursor: pointer; }
    .success-state { text-align: center; padding: 16px 0; }
    .success-icon { font-size: 56px; margin-bottom: 14px; color: #10B981; }
    .success-title { color: var(--navy); font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .success-desc { color: var(--text-light); font-size: 14px; line-height: 1.7; margin-bottom: 22px; }

    .not-found { min-height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 100px 5% 40px; gap: 16px; }
    .not-found h1 { color: var(--navy); font-size: 24px; }
    .not-found p { color: var(--text-light); }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .hero-actions { flex-direction: column; }
      .btn-primary, .btn-whatsapp { justify-content: center; }
      .about-card { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="#" class="nav-logo">
    <div class="nav-logo-img-wrap"><img src="logo.png" class="nav-logo-img" alt="مبادر كوتشينج" onerror="this.parentElement.style.display='none'" /></div>
  </a>
  <a href="index.html" class="nav-back">→ الرئيسية</a>
</nav>

<div id="page-content">
  <!-- filled dynamically -->
</div>

<div class="overlay" id="order-overlay">
  <div class="modal" id="order-modal">
    <div class="modal-header">
      <div class="modal-title">التسجيل / الطلب</div>
      <button class="modal-close" onclick="closeOrder()">✕</button>
    </div>
    <div class="modal-body" id="order-modal-body"></div>
  </div>
</div>

<footer>
  <div class="footer-copy" style="margin-bottom:10px"><a href="index.html">مبادر كوتشينج</a> — جميع الحقوق محفوظة</div>
  <div class="footer-copy">واتساب: 0096877684008</div>
</footer>

<script>
const WA_NUM = '96877684008';

function openWhatsApp(msg) {
  const encoded = encodeURIComponent(msg || '');
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  const url = isMobile
    ? 'https://wa.me/' + WA_NUM + (encoded ? '?text=' + encoded : '')
    : 'https://web.whatsapp.com/send?phone=' + WA_NUM + (encoded ? '&text=' + encoded : '');
  window.open(url, '_blank');
}

let SITE_DATA = { products: [], orders: [], carts: [], productTypes: {} };
let CURRENT_PRODUCT = null;

async function loadSiteData(){
  try{
    const res = await fetch('/api/data', { cache: 'no-store' });
    SITE_DATA = await res.json();
  }catch(err){ console.error('Failed to load site data', err); }
  return SITE_DATA;
}

// Field label dictionary — used to render meta details generically per type
const FIELD_LABELS = {
  duration: { icon:'⏱', label:'المدة' },
  durationSub: null,
  format: { icon:'💻', label:'طريقة الحضور' },
  formatSub: null,
  sessions: { icon:'📋', label:'الجلسات' },
  sessionsSub: null,
  pagesCount: { icon:'📄', label:'عدد الصفحات' },
  fileFormat: { icon:'📁', label:'صيغة الملف' },
  language: { icon:'🌐', label:'اللغة' },
  sessionDuration: { icon:'⏱', label:'مدة الجلسة' },
  sessionsCount: { icon:'📋', label:'عدد الجلسات' },
  videoDuration: { icon:'🎬', label:'مدة الفيديو' },
  lessonsCount: { icon:'📋', label:'عدد الدروس' },
  accessPeriod: { icon:'🔑', label:'مدة الوصول' },
  customField1Label: null, customField1Value: null,
  customField2Label: null, customField2Value: null
};

function buildDetailsGrid(p){
  const typeInfo = SITE_DATA.productTypes[p.type] || {};
  const fields = typeInfo.fields || [];
  const cards = [];

  fields.forEach(f => {
    if (f === 'outputs' || f === 'extras' || f === 'tableOfContents') return;
    const meta = FIELD_LABELS[f];
    if (!meta) return; // sub-fields handled together with their main field
    const value = p[f];
    if (!value) return;
    let sub = '';
    const subKey = f + 'Sub';
    if (p[subKey]) sub = p[subKey];
    cards.push(`<div class="detail-card"><div class="ic">${meta.icon}</div><div class="lbl">${value}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`);
  });

  // Custom fields (type "other") use label+value pairs directly
  if (p.customField1Label && p.customField1Value) {
    cards.push(`<div class="detail-card"><div class="ic">▪</div><div class="lbl">${p.customField1Value}</div><div class="sub">${p.customField1Label}</div></div>`);
  }
  if (p.customField2Label && p.customField2Value) {
    cards.push(`<div class="detail-card"><div class="ic">▪</div><div class="lbl">${p.customField2Value}</div><div class="sub">${p.customField2Label}</div></div>`);
  }

  return cards.join('');
}

function renderProduct(p){
  const typeInfo = SITE_DATA.productTypes[p.type] || {};
  document.getElementById('page-title').textContent = p.name + ' — مبادر كوتشينج';
  document.getElementById('page-desc').setAttribute('content', p.desc || '');

  const detailsHtml = buildDetailsGrid(p);
  const outputsHtml = (p.outputs||[]).map(o=>`<div class="output-item"><span class="chk">✓</span>${o}</div>`).join('');
  const tocHtml = (p.tableOfContents||[]).map(o=>`<div class="output-item"><span class="chk">📖</span>${o}</div>`).join('');
  const extrasHtml = (p.extras||[]).map(e=>`<span class="extra-pill">${e}</span>`).join('');

  document.getElementById('page-content').innerHTML = `
    <section class="hero">
      <div class="hero-bg-pattern"></div>
      <div class="hero-inner">
        <div class="hero-type-badge">${typeInfo.icon||'📦'} ${typeInfo.label||'منتج'}</div>
        <h1 class="hero-title">${p.name}</h1>
        ${p.tagline ? `<div class="hero-tagline">${p.tagline}</div>` : ''}
        <p class="hero-desc">${p.desc||''}</p>
        <div class="hero-actions">
          <button class="btn-primary" onclick="openOrderForm()"><span>${p.cta||'سجّل الآن'}</span><span>←</span></button>
          <button class="btn-whatsapp" onclick="openWhatsApp('مرحباً، أرغب في الاستفسار عن: ${p.name}')"><span>💬</span><span>استفسار واتساب</span></button>
        </div>
      </div>
    </section>

    ${detailsHtml ? `
    <section class="section details-section">
      <div class="section-inner">
        <div class="details-grid">${detailsHtml}</div>
      </div>
    </section>` : ''}

    ${outputsHtml ? `
    <section class="section">
      <div class="section-inner">
        <h2 class="section-title">ماذا ستحصل عليه؟</h2>
        <div class="outputs-list">${outputsHtml}</div>
      </div>
    </section>` : ''}

    ${tocHtml ? `
    <section class="section">
      <div class="section-inner">
        <h2 class="section-title">محتويات الكتاب</h2>
        <div class="outputs-list">${tocHtml}</div>
      </div>
    </section>` : ''}

    ${extrasHtml ? `
    <section class="section extras-section">
      <div class="section-inner">
        <h2 class="section-title">مميزات إضافية</h2>
        <div class="extras-list">${extrasHtml}</div>
      </div>
    </section>` : ''}

    <section class="section buy-section">
      <div class="section-inner">
        <div class="buy-card">
          <div class="buy-price">${p.price} ${p.currency||''}</div>
          <div class="buy-price-unit">السعر شامل</div>
          <div class="buy-actions">
            <button class="btn-buy-main" onclick="openOrderForm()">${p.cta||'سجّل الآن'}</button>
            <button class="btn-buy-wa" onclick="openWhatsApp('مرحباً، أرغب في الاستفسار عن: ${p.name}')">💬 استفسار عبر الواتساب</button>
          </div>
        </div>
      </div>
    </section>

    <section class="section about-section">
      <div class="section-inner">
        <div class="about-card">
          <div class="about-photo"><img src="coach.jpg" alt="الكوتش عمر المرزوقي" onerror="this.style.display='none'" /></div>
          <div class="about-text">
            <h3>الكوتش عمر المرزوقي</h3>
            <p>كوتش ومستشار ريادة أعمال عماني، بخبرة عملية تمتد لأكثر من 25 سنة، وشهادات معتمدة من مؤسسات بريطانية وأمريكية في تدريب وتأهيل رواد الأعمال.</p>
          </div>
        </div>
      </div>
    </section>
  `;
}

function renderNotFound(){
  document.getElementById('page-content').innerHTML = `
    <div class="not-found">
      <h1>عذراً، هذا المنتج غير متوفر حالياً</h1>
      <p>قد يكون تم إيقافه أو الرابط غير صحيح</p>
      <a href="index.html" class="btn-primary" style="background:var(--navy);color:white">العودة للرئيسية</a>
    </div>
  `;
}

let currentCartId = null;

function openOrderForm(){
  const p = CURRENT_PRODUCT;
  if(!p) return;
  document.getElementById('order-modal-body').innerHTML = `
    <div style="background:rgba(13,31,60,0.05);border-radius:8px;padding:10px 14px;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:16px;border:1px dashed var(--gray-300)">▪ ${p.name} — ${p.price} ${p.currency||''}</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">الاسم الكامل <span style="color:var(--gold)">*</span></label><input type="text" class="form-input" id="f-name" placeholder="أدخل اسمك الكريم" /></div>
      <div class="form-group"><label class="form-label">رقم الهاتف <span style="color:var(--gold)">*</span></label><input type="tel" class="form-input" id="f-phone" placeholder="مثال: 96877600000" /></div>
    </div>
    <div class="form-group"><label class="form-label">البريد الإلكتروني</label><input type="email" class="form-input" id="f-email" placeholder="example@email.com" /></div>
    <div class="form-group"><label class="form-label">ملاحظات (اختياري)</label><textarea class="form-input" id="f-notes" rows="3" placeholder="أي معلومات إضافية..."></textarea></div>
    <button class="submit-btn" id="submit-order-btn" onclick="submitOrder()">أرسل الطلب ←</button>
    <p style="text-align:center;font-size:12px;color:var(--text-light);margin-top:10px">سيتواصل معك فريقنا عبر الواتساب خلال 24 ساعة</p>
  `;
  document.getElementById('order-overlay').classList.add('open');
  saveAbandonedCart('opened_form');
}

function closeOrder(){ document.getElementById('order-overlay').classList.remove('open'); }

async function submitOrder(){
  const p = CURRENT_PRODUCT;
  const name=document.getElementById('f-name').value.trim();
  const phone=document.getElementById('f-phone').value.trim();
  const email=document.getElementById('f-email').value.trim();
  const notes=document.getElementById('f-notes').value.trim();
  if(!name||!phone){alert('الرجاء إدخال الاسم ورقم الهاتف');return;}
  const btn=document.getElementById('submit-order-btn');
  btn.disabled=true;btn.textContent='جاري الإرسال...';
  const orders=SITE_DATA.orders||[];
  const order={id:'ORD-'+Date.now(),name,phone,email,notes,products:[{id:p.id,name:p.name,priceNum:p.price}],total:p.price,status:'new',internalNote:'',createdAt:new Date().toISOString(),source:'product_page'};
  orders.unshift(order);
  const carts = SITE_DATA.carts||[];
  if(currentCartId){const idx=carts.findIndex(c=>c.id===currentCartId);if(idx>=0){carts[idx].status='converted';carts[idx].orderId=order.id;}}
  try{
    await fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({orders,carts})});
  }catch(e){ console.error(e); }
  const waMsg='مرحباً، لقد سجّلت طلباً لـ: '+p.name+'. اسمي: '+name+'، رقمي: '+phone;
  document.getElementById('order-modal-body').innerHTML=`
    <div class="success-state">
      <div class="success-icon">✓</div>
      <div class="success-title">تم استلام طلبك بنجاح!</div>
      <div class="success-desc">شكرًا لك ${name}! سيتواصل معك فريق مبادر كوتشينج خلال 24 ساعة.</div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button onclick="openWhatsApp('${waMsg.replace(/'/g,"\\'")}')" class="btn-whatsapp">💬 تواصل معنا الآن</button>
        <button onclick="closeOrder()" style="background:none;border:2px solid var(--gray-200);color:var(--navy);padding:12px 24px;border-radius:10px;font-family:var(--font);font-weight:600;cursor:pointer">إغلاق</button>
      </div>
    </div>
  `;
}

async function saveAbandonedCart(stage){
  const p = CURRENT_PRODUCT;
  const carts = SITE_DATA.carts||[];
  if(!currentCartId){
    currentCartId='CART-'+Date.now();
    carts.unshift({id:currentCartId,products:[{id:p.id,name:p.name,priceNum:p.price}],total:p.price,stage,status:'active',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),internalNote:''});
  }
  try{
    await fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({carts})});
  }catch(e){ console.error(e); }
}

document.addEventListener('DOMContentLoaded', async ()=>{
  await loadSiteData();
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const product = (SITE_DATA.products||[]).find(p => p.id === id && p.active);
  if(product){
    CURRENT_PRODUCT = product;
    renderProduct(product);
  } else {
    renderNotFound();
  }
});
</script>
